<style>
/* =========================
   DARK MODE CORE
========================= */

body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
}

/* Navbar */

    background-color: #1f1f1f !important;
}

/* Cards */

    background-color: #1e1e1e;
    color: #e0e0e0;
    border-color: #333;
}

/* Tables base */

}

/* Stripes */

    background-color: rgba(255, 255, 255, 0.05);

/* Modals */

    background-color: #1e1e1e;
    color: #e0e0e0;
}

/* Inputs */

body.dark-mode .form-select {
    background-color: #2a2a2a;
    color: #e0e0e0;
    border-color: #444;

/* =========================
   SAVED FLIGHTS DROPDOWN FIX
========================= */

    background-color: #2a2a2a !important;
    color: #e0e0e0 !important;
    border-color: #444 !important;
}

/* Dropdown options (best-effort browser support) */
body.dark-mode #savedFlights option {
    background-color: #2a2a2a !important;
    color: #e0e0e0 !important;
}

/* Focus state */
body.dark-mode #savedFlights.form-select:focus {
    background-color: #2a2a2a !important;
    color: #ffffff !important;
    border-color: #666 !important;
    box-shadow: 0 0 0 0.2rem rgba(80, 80, 80, 0.25) !important;
}

/* Alerts */
body.dark-mode .alert {
    background-color: #2a2a2a;
    color: #e0e0e0;
    border-color: #444;
}

/* FORCE TEXT */
body.dark-mode {
    color: #e0e0e0 !important;
}

body.dark-mode p,
body.dark-mode h1,
body.dark-mode h2,
body.dark-mode h3,
body.dark-mode h4,
body.dark-mode h5,
body.dark-mode h6,
body.dark-mode span,
body.dark-mode div,
body.dark-mode label,
body.dark-mode small,
body.dark-mode li,
body.dark-mode td,
body.dark-mode th {
    color: #e0e0e0 !important;
}

body.dark-mode a {
    color: #8ab4f8;
}

body.dark-mode .btn {
    color: inherit;
}

body.dark-mode table {
    color: #e0e0e0 !important;
}

/* Layout fixes */
body.dark-mode .bg-white {
    background-color: #1e1e1e !important;
}

body.dark-mode .sticky-action-bar {
    background-color: #1a1a1a !important;
    border-bottom: 1px solid #333;
}

}

/* Tabs */
body.dark-mode .nav-tabs {
    border-bottom: 1px solid #333;
}

body.dark-mode .nav-tabs .nav-link {
    color: #bbb;
    background-color: transparent;
}

body.dark-mode .nav-tabs .nav-link.active {
    background-color: #1e1e1e;
    color: #fff;
}

/* Pagination */
body.dark-mode .page-link {
    background-color: #1e1e1e;
    border-color: #333;
    color: #e0e0e0;

/* Buttons outline */
body.dark-mode .btn-outline-primary,
body.dark-mode .btn-outline-success,
body.dark-mode .btn-outline-warning,
body.dark-mode .btn-outline-danger,
body.dark-mode .btn-outline-secondary,
body.dark-mode .btn-outline-info {
    color: #e0e0e0;
    border-color: #555;
}

/* Warning button fix */
body.dark-mode .btn-warning,
body.dark-mode .btn-warning:hover,
body.dark-mode .btn-warning:focus {
    color: #000 !important;
}

/* Tables full fix */
body.dark-mode .table thead th {
    background-color: #2a2a2a !important;
    color: #ffffff !important;
    border-color: #333 !important;
}

body.dark-mode .table tbody td {
    background-color: #1e1e1e !important;
    border-color: #333 !important;
}

body.dark-mode .table-hover tbody tr:hover td {
    background-color: #2c2c2c !important;
}

body.dark-mode .table-bordered,
body.dark-mode .table-bordered td,
body.dark-mode .table-bordered th {
    border-color: #333 !important;
}

body.dark-mode .table-responsive {
    background-color: #1e1e1e !important;
}

/* ============================= */
/* FORM SELECT ARROW DARK MODE FIX */
/* ============================= */

body.dark-mode .form-select {
    background-color: #2b2b2b !important;
    color: #ffffff !important;
    border: 1px solid #444 !important;

    /* Replace Bootstrap default arrow with white SVG arrow */
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e") !important;

    background-repeat: no-repeat !important;
    background-position: right 0.75rem center !important;
    background-size: 16px 12px !important;
}

/* Ensure dropdown options remain readable */
body.dark-mode .form-select option {
    background-color: #2b2b2b !important;
    color: #ffffff !important;
}

/* Focus state consistency */
body.dark-mode .form-select:focus {
    background-color: #333333 !important;
    color: #ffffff !important;
    border-color: #0d6efd !important;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25) !important;
}

/* ============================= */
/* PLACEHOLDER TEXT DARK MODE FIX */
/* ============================= */

body.dark-mode input::placeholder,
body.dark-mode textarea::placeholder,
body.dark-mode .form-control::placeholder {
    color: #ffffff !important;
    opacity: 0.7 !important;
}

/* Safari / older browser support */
body.dark-mode input::-webkit-input-placeholder,
body.dark-mode textarea::-webkit-input-placeholder {
    color: #ffffff !important;
    opacity: 0.7 !important;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const themeToggle = document.getElementById("themeToggle") || document.getElementById("darkModeToggle");
    const savedTheme = localStorage.getItem("theme");

    function setPlotlyTheme(isDark) {
        if (typeof Plotly === "undefined") return;

        const plots = document.querySelectorAll(".js-plotly-plot");
        plots.forEach((plot) => {
            const template = isDark ? "plotly_dark" : "plotly";
            try {
                Plotly.relayout(plot, { template: template });
            } catch (e) {
                console.warn("Plotly theme update failed:", e);
            }
        });
    }

    function applyTheme(isDark) {
        document.body.classList.toggle("dark-mode", isDark);
        localStorage.setItem("theme", isDark ? "dark" : "light");

        if (themeToggle) {
            themeToggle.textContent = isDark ? "☀️" : "🌙";
        }

        setPlotlyTheme(isDark);
    }

    // Init theme on load
    const isDark = savedTheme === "dark";
    applyTheme(isDark);

    if (!themeToggle) return;

    themeToggle.addEventListener("click", function () {
        const currentlyDark = document.body.classList.contains("dark-mode");
        applyTheme(!currentlyDark);
    });
});
</script>
