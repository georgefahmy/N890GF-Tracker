<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMI Spread Analysis</title>
    {% include 'dark_mode.html' %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/analyzer">← Back</a>
        <span class="navbar-text text-white">✈️ Gami Spread Analysis</span>
    </div>
</nav>

<body class="" style="padding-top: 70px;">

<div class="container-fluid p-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-secondary">GAMI Spread Analysis</h3>
    </div>

    <!-- FLIGHT SELECT -->
    <div class="card p-3 mb-3">
        <div class="row g-2 align-items-end">

            <div class="col-md-6">
                <label class="form-label">Select Flight</label>
                <select id="savedFlights" class="form-select" onchange="loadFlight()"></select>
            </div>


        </div>
    </div>

    <!-- Temp Unit Toggle -->
    <div class="btn-group" role="group">
        <input type="radio" class="btn-check" name="tempUnit" id="unitF" autocomplete="off" value="F" checked>
        <label class="btn btn-outline-primary btn-sm" for="unitF">°F</label>

        <input type="radio" class="btn-check" name="tempUnit" id="unitC" autocomplete="off" value="C">
        <label class="btn btn-outline-primary btn-sm" for="unitC">°C</label>
    </div>
    <!-- METRICS -->
    <div class="card p-3 mb-3">
        <div id="metrics" class="text-muted">No data loaded.</div>
    </div>

    <!-- CHARTS -->
    <div class="row g-3">

        <div class="col-md-6">
            <div class="card p-3">
                <div id="timeGraph" style="height:350px;"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <div id="scatterGraph" style="height:350px;"></div>
            </div>
        </div>


    </div>
</div>

</body>
<script src="{{ url_for('static', filename='gami.js') }}"></script>
</body>
</html>
