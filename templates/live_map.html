<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - N890GF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Remove default margins and prevent double scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #212529; /* Dark background matching nav */
        }

        /* Custom top header bar */
        .header-bar {
            height: 60px;
            background-color: #212529;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #333;
        }

        /* Fill the remaining vertical space */
        .iframe-container {
            height: calc(100vh - 60px);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header-bar text-white d-flex justify-content-between">
        <a class="navbar-brand" href="/">← Back </a>
        <span class="navbar-text text-white m-2"> ✈️ ADSB Live Traffic</span>

        <div class="input-group input-group-sm ms-auto" style="max-width: 300px;">
            <input type="text" id="adsbSearchInput" class="form-control text-uppercase" placeholder="Enter N-Number">
            <button class="btn btn-primary" type="button" id="adsbSearchBtn">Search</button>
        </div>
    </div>

    <div class="iframe-container">
        <iframe id="adsbIframe" src="https://globe.adsbexchange.com/?sidebarWidth=200&" width="100%" height="100%" style="border:none;"></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchBtn = document.getElementById('adsbSearchBtn');
            const searchInput = document.getElementById('adsbSearchInput');
            const iframe = document.getElementById('adsbIframe');

            function updateAdsbMap() {
                let nNumber = searchInput.value.trim().toLowerCase();

                // If a tail number is entered, append it. Otherwise load the global map.
                if (nNumber) {
                    iframe.src = "https://globe.adsbexchange.com/?sidebarWidth=200&reg=" + encodeURIComponent(nNumber);
                } else {
                    iframe.src = "https://globe.adsbexchange.com/?sidebarWidth=200";
                }
            }

            // Click listener for the button
            searchBtn.addEventListener('click', updateAdsbMap);

            // Enter key listener for the input field
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    updateAdsbMap();
                }
            });
        });
    </script>
</body>
</html>
