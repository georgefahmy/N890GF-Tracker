{% extends "base.html" %}

{% block title %}Media Gallery - N890GF{% endblock %}

{% block content %}
<style>
    /* Content-specific styles for the gallery */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .media-card {
        background: white;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        text-align: center;
    }
    .media-card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 4px;
        cursor: pointer;
    }
    .file-name {
        font-size: 0.8rem;
        color: #666;
        margin: 10px 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .copy-btn {
        font-size: 0.7rem;
        padding: 5px 10px;
        cursor: pointer;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
    }
    .delete-btn {
        font-size: 0.7rem;
        padding: 5px 10px;
        cursor: pointer;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 4px;
        margin-left: 5px;
    }
    .btn-group {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-top: 10px;
    }
    .upload-section {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .upload-section input[type="file"] {
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 4px;
        flex-grow: 1;
    }
    .upload-btn {
        background: #28a745;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Media Gallery</h2>
    <a href="{{ url_for('blog') }}" style="text-decoration:none;">&larr; Back to Dashboard</a>
</div>

<div class="upload-section">
    <form action="{{ url_for('upload_to_gallery') }}" method="POST" enctype="multipart/form-data" style="display: flex; width: 100%; gap: 15px; align-items: center;">
        <label style="font-weight: bold;">Upload New Media:</label>
        <input type="file" name="file" accept="image/*" required>
        <button type="submit" class="upload-btn">Upload to Gallery</button>
    </form>
</div>

<div class="gallery-grid">
    {% for file in files %}
        <div class="media-card">
            {% if file.lower().endswith(('.png', '.jpg', '.jpeg', '.gif', '.webp')) %}
                <img src="{{ url_for('static', filename='uploads/' + file) }}" alt="{{ file }}" onclick="window.open(this.src)">
            {% else %}
                <div style="height: 150px; display: flex; align-items: center; justify-content: center; background: #eee;">
                    📄
                </div>
            {% endif %}
            <div class="file-name">{{ file }}</div>

            <div class="btn-group">
                <form action="{{ url_for('delete_media', filename=file) }}" method="POST" onsubmit="return confirm('Delete this image permanently?');">
                    <button type="submit" class="delete-btn">Delete</button>
                </form>
            </div>
        </div>
    {% endfor %}
</div>

<script>
    function copyToClipboard(url) {
        const absoluteUrl = window.location.origin + url;
        navigator.clipboard.writeText(absoluteUrl).then(() => {
            alert('URL copied to clipboard!');
        });
    }
</script>
{% endblock %}
