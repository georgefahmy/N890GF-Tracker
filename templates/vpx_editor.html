<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPX Live Editor | N890GF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include 'dark_mode.html' %}
    <style>
        body { background-color: #f8f9fa; padding-top: 70px; }
        .upload-zone {
            border: 2px dashed #dee2e6;
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .upload-zone:hover { border-color: #0d6efd; background: rgba(13, 110, 253, 0.05); }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pin-id { font-size: 0.75rem; color: #6c757d; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">← Back to Dashboard</a>
            <a class="navbar-brand" href="/">✈️ N890GF Tracker</a>
            <div class="ms-auto">
                <button class="btn btn-primary btn-sm" onclick="exportXml()">Download Updated .vpx</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center mb-5" id="uploadBlock">
            <div class="col-md-8">
                <div class="upload-zone p-5 text-center" onclick="document.getElementById('vpxInput').click()">
                    <i class="bi bi-file-earmark-code fs-1 text-primary"></i>
                    <h4 class="mt-3">Upload .vpx Configuration</h4>
                    <p class="text-muted">Drag and drop your file here or click to browse</p>
                    <input type="file" id="vpxInput" hidden accept=".vpx,.xml" onchange="handleFileUpload(event)">
                </div>
            </div>
        </div>

        <div id="editorContent" class="d-none">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card p-3">
                        <label class="small fw-bold">Pilot Name</label>
                        <input type="text" id="vpxUser" class="form-control">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-3">
                        <label class="small fw-bold">Tail Number</label>
                        <input type="text" id="vpxTail" class="form-control">
                    </div>
                </div>
            </div>

            <div class="row g-3" id="circuitContainer">
                </div>
        </div>
    </div>

    <script>
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log("File detected:", file.name);

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(e.target.result, "text/xml");

                    // Check if XML is valid
                    if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                        throw new Error("Invalid XML format. Please upload a valid .vpx file.");
                    }

                    parseAndRender(xmlDoc);
                } catch (err) {
                    console.error(err);
                    alert(err.message);
                }
            };
            reader.readAsText(file);
        }

        function parseAndRender(xml) {
            console.log("Parsing XML...");

            // 1. Map Header Fields
            const user = xml.getElementsByTagName("User")[0]?.textContent || "";
            const tail = xml.getElementsByTagName("TailNumber")[0]?.textContent || "";

            document.getElementById('vpxUser').value = user;
            document.getElementById('vpxTail').value = tail;
            if(document.getElementById('navTailDisplay')) {
                document.getElementById('navTailDisplay').textContent = tail;
            }

            // 2. Map Circuits
            const circuits = xml.getElementsByTagName("CircuitConfiguration");
            const container = document.getElementById('circuitContainer');
            container.innerHTML = '';

            if (circuits.length === 0) {
                alert("No circuit configurations found in this file.");
                return;
            }

            Array.from(circuits).forEach(c => {
                const id = c.getElementsByTagName("Id")[0]?.textContent || "Unknown";
                const name = c.getElementsByTagName("Name")[0]?.textContent || "";
                const breaker = c.getElementsByTagName("BreakerValue")[0]?.textContent || "0";
                const swId = c.getElementsByTagName("SwitchId")[0]?.textContent || "AlwaysOff";
                const enabled = c.getElementsByTagName("Enabled")[0]?.textContent === "true";

                const html = `
                    <div class="col-md-4 circuit-card" data-id="${id}">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="badge bg-secondary-subtle text-secondary border">${id}</span>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" ${enabled ? 'checked' : ''} id="en-${id}">
                                    </div>
                                </div>
                                <input type="text" class="form-control form-control-sm mb-2 fw-bold" value="${name}" id="nm-${id}">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="small text-muted" style="font-size: 10px;">BREAKER</label>
                                        <div class="input-group input-group-sm">
                                            <input type="number" class="form-control" value="${breaker}" id="br-${id}">
                                            <span class="input-group-text">A</span>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <label class="small text-muted" style="font-size: 10px;">SWITCH</label>
                                        <select class="form-select form-select-sm" id="sw-${id}">
                                            <option value="AlwaysOn" ${swId === 'AlwaysOn' ? 'selected' : ''}>Always On</option>
                                            <option value="Switch3" ${swId === 'Switch3' ? 'selected' : ''}>Avionics</option>
                                            <option value="Switch4" ${swId === 'Switch4' ? 'selected' : ''}>Boost Pump</option>
                                            <option value="AlwaysOff" ${swId === 'AlwaysOff' ? 'selected' : ''}>Always Off</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });

            // 3. Reveal the Editor
            document.getElementById('uploadBlock').classList.add('d-none');
            document.getElementById('editorContent').classList.remove('d-none');
            console.log("UI Rendered Successfully.");
        }
    </script>
</body>
