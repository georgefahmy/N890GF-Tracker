<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPX Live Editor | Connector View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; padding-top: 70px; }

        .connector-header {
            background: #212529;
            color: white;
            padding: 10px 15px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        .connector-body {
            background: white;
            border: 1px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            margin-bottom: 2rem;
        }
        .pin-row { border-bottom: 1px solid #eee; padding: 8px 0; }
        .pin-row:last-child { border-bottom: none; }
        .pin-label { width: 70px; font-weight: bold; color: #0d6efd; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">← Back to Dashboard</a>
            <h6 class="navbar-text text-white">✈️ VPX Editor</h6>
            <div class="ms-auto">
                <button class="btn btn-primary btn-sm" onclick="exportXml()">Download .vpx</button>
            </div>
        </div>
    </nav>

    <div class="container" id="editorContent">
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">Pilot Name</label>
                <input type="text" id="vpxUser" class="form-control" placeholder="Enter Pilot Name">
            </div>
            <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">Tail Number</label>
                <input type="text" id="vpxTail" class="form-control" placeholder="Enter Tail Number">
            </div>
        </div>

        <div id="connectorGroups">
            </div>
    </div>

    <script>
        // Define the hardware connectors and their pin counts
        const connectors = [
            { id: 'J8', name: 'J8 - 8 Pin Power Connector (High Current)', pins: 8 },
            { id: 'J10', name: 'J10 - 10 Pin Power Connector', pins: 10 },
            { id: 'J12', name: 'J12 - 12 Pin Power Connector', pins: 12 },
            { id: 'J1', name: 'J1 - 25 Pin dSub (Inputs/Low Power)', pins: 25 },
            { id: 'J2', name: 'J2 - 25 Pin dSub (Inputs/Low Power)', pins: 25 }
        ];

        // Generate the UI on page load
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('connectorGroups');

            connectors.forEach(connector => {
                // 1. Create Connector Wrapper
                let connectorHtml = `
                    <div class="connector-wrap" id="group-${connector.id}">
                        <div class="connector-header">${connector.name}</div>
                        <div class="connector-body" id="container-${connector.id}">
                `;

                // 2. Loop through the number of pins and create rows
                for (let i = 1; i <= connector.pins; i++) {
                    const pinId = `${connector.id}-${i}`;

                    connectorHtml += `
                        <div class="pin-row row align-items-center">
                            <div class="col-auto text-nowrap pin-label">${pinId}</div>
                            <div class="col-md-3">
                                <input type="text" class="form-control form-control-sm fw-bold" id="nm-${pinId}" placeholder="Circuit Name (Blank)">
                            </div>
                            <div class="col-md-2">
                                <div class="input-group input-group-sm">
                                    <select class="form-select form-select-sm" id="br-${pinId}">
                                        <option value="" disabled selected>Select</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                        <option value="6">6</option>
                                        <option value="7">7</option>
                                        <option value="8">8</option>
                                        <option value="9">9</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                        <option value="13">13</option>
                                        <option value="14">14</option>
                                        <option value="15">15</option>
                                    </select>
                                    <span class="input-group-text">Amps</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="sw-${pinId}">
                                    <option value="AlwaysOff" selected>Always Off</option>
                                    <option value="AlwaysOn">Always On</option>
                                    <option value="Switch3">Avionics Sw</option>
                                    <option value="Switch4">Boost Pump Sw</option>
                                    <option value="Switch5">Landing Light Sw</option>
                                    <option value="Switch6">Taxi Light Sw</option>
                                    <option value="Switch7">Nav Light Sw</option>
                                    <option value="Switch8">Strobe Light Sw</option>
                                    <option value="Switch9">Mag Left Sw</option>
                                    <option value="Switch10">Mag Right Sw</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="en-${pinId}">
                                    <label class="small text-muted">Enabled</label>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 3. Close the wrapper and append to main container
                connectorHtml += `</div></div>`;
                container.insertAdjacentHTML('beforeend', connectorHtml);
            });
        });

        function exportXml() {
            // Stub for compiling the currently visible fields back into XML
            alert("This will collect data from all visible pins and export a .vpx file.");
        }
    </script>
</body>
</html>
