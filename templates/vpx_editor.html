<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPX Configurator | N890GF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --vpx-dark: #1e293b; --vpx-blue: #3b82f6; --vpx-bg: #f8fafc; }
        body { background-color: var(--vpx-bg); padding-top: 70px; font-family: 'Inter', -apple-system, sans-serif; }
        .navbar { position: fixed; top: 0; width: 100%; z-index: 1050; }
        /* Connector Styling */
        .connector-header {
            background: var(--vpx-dark); color: white; padding: 14px 20px;
            border-radius: 12px 12px 0 0; font-family: monospace;
            display: flex; justify-content: space-between; align-items: center;
        }
        .connector-body {
            background: white; border: 1px solid #e2e8f0; border-top: none;
            border-radius: 0 0 12px 12px; padding: 10px 20px; margin-bottom: 30px;
        }

        /* Modern Device Card Styling */
        .device-card {
            position: relative; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px;
            background: white; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .device-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: var(--vpx-blue); }
        .device-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--vpx-blue); opacity: 0; transition: opacity 0.2s; }
        .device-card:hover::before { opacity: 1; }

        .device-icon-area { width: 32px; height: 32px; border-radius: 8px; background: #eff6ff; color: var(--vpx-blue); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-weight: bold; }
        .device-card .card-title { font-size: 0.95rem; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
        .device-card .card-meta { font-size: 0.75rem; color: #64748b; line-height: 1.4; }

        /* Switch List Styling */
        .switch-list-item { font-size: 0.85rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; background: white; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .switch-list-item:hover { border-color: var(--vpx-blue); background: #f0f7ff; }

        /* Collapse Header Styling */
        .collapse-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .collapse-header::after {
            content: '▼';
            font-size: 0.7em;
            color: #64748b;
            transition: transform 0.2s ease-in-out;
        }
        .collapse-header.collapsed::after {
            transform: rotate(-90deg);
        }

        /* Pin Editor Row Styling */
        .pin-row { border-bottom: 1px solid #f1f5f9; padding: 8px 0; transition: background 0.2s; cursor: pointer; }
        .pin-row:hover { background-color: #f8fafc; }
        .pin-row.active-selection { background-color: #f0f7ff; border-left: 4px solid var(--vpx-blue); }
        .pin-id { font-weight: 700; color: #64748b; min-width: 80px; }

        /* Update the Sidebar Scrolling Logic in your <style> block */
        .sticky-sidebar {
            position: sticky;
            top: 85px;
            max-height: calc(100vh - 110px);
            overflow-y: auto;
            overflow-x: hidden; /* Prevent horizontal scroll for the entire sidebar */
            padding-right: 5px;
        }

        /* Add this to ensure cards and list items don't push the width */
        #deviceLibraryContent, #switchLibraryContent {
            width: 100%;
            word-wrap: break-word;
        }

        .switch-list-item {
            /* ... existing styles ... */
            overflow: hidden; /* Ensure long names don't push out */
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">← Back</a>
            <span class="navbar-text text-white fw-bold">✈️ VPX Configurator</span>
            <span class="badge bg-primary ms-2">N890GF</span>
            <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="exportConfig()">Export Config</button>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-lg-3">
                <div class="sticky-sidebar">
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="mb-0 fw-bold text-dark collapse-header" data-bs-toggle="collapse" href="#collapseSwitch" role="button" aria-expanded="true" aria-controls="collapseSwitch">
                                Switch Definitions
                            </h6>
                            <button class="btn btn-sm btn-link text-primary text-decoration-none fw-bold" onclick="openSwitchModal()">+ Add</button>
                        </div>
                        <div class="collapse show" id="collapseSwitch">
                            <div id="switchLibraryContent" class="m-0"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="mb-0 fw-bold text-dark collapse-header" data-bs-toggle="collapse" href="#collapseDevice" role="button" aria-expanded="true" aria-controls="collapseDevice">
                                Device Library
                            </h6>
                            <button class="btn btn-sm btn-link text-primary text-decoration-none fw-bold" onclick="openDeviceModal()">+ Add</button>
                        </div>
                        <div class="collapse show" id="collapseDevice">
                            <div class="row g-3 m-0" id="deviceLibraryContent"></div>
                        </div>
                    </div>              </div>
            </div>

            <div class="col-lg-9">
                <div id="connectorList"></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold">Device Editor</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editDeviceId">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control mb-3 rounded-3" id="devName">
                    <label class="form-label">Breaker Size</label>
                    <select class="form-select mb-3 rounded-3" id="devBreaker">
                        <option value="1">1A</option><option value="2">2A</option>
                        <option value="5">5A</option><option value="10">10A</option>
                        <option value="15">15A</option>
                    </select>
                    <label class="form-label">Default Switch</label>
                    <select class="form-select rounded-3" id="devSwitch"></select>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-primary w-100 rounded-pill" onclick="saveDevice()">Save to Library</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="switchModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold">Switch Label</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editSwitchId">
                    <label class="form-label">Label</label>
                    <input type="text" class="form-control rounded-3" id="swLabel">
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-dark w-100 rounded-pill" onclick="saveSwitch()">Save Switch</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vpx_editor.js"></script>
</body>
</html>
